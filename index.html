<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OVERFANTASY Prototype</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="game-frame" aria-label="OVERFANTASY prototype">
      <div id="game-container"></div>
      <div id="toast" class="toast" aria-live="polite"></div>
      <div id="backpackPanel" class="backpack-panel hidden" aria-label="backpack panel"></div>
      <div id="questPanel" class="quest-panel hidden" aria-label="quest panel"></div>
      <div id="shopPanel" class="shop-panel hidden" aria-label="shop panel"></div>
      <div id="forgePanel" class="forge-panel hidden" aria-label="forge panel"></div>
      <div id="magicPanel" class="magic-panel hidden" aria-label="magic panel"></div>
      <div id="characterPanel" class="character-panel hidden" aria-label="character status panel"></div>
      <div id="careerPanel" class="career-panel hidden" aria-label="career panel"></div>
      <div id="mainMenu" class="menu-panel hidden" aria-label="main menu"></div>
      <div id="pauseMenu" class="pause-panel hidden" aria-label="pause menu"></div>
    </section>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
