<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OVERFANTASY Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <section class="game-frame" aria-label="OVERFANTASY prototype">
      <canvas id="game" width="960" height="640"></canvas>
      <div id="toast" class="toast" aria-live="polite"></div>
    </section>
    <aside class="panel" aria-label="status panel">
      <header>
        <p class="label">OVERFANTASY</p>
        <h1>Classic 2D Prototype</h1>
      </header>
      <div class="stats" id="stats"></div>
      <div class="legend">
        <div><span class="dot player"></span>玩家/生物</div>
        <div><span class="square"></span>房屋/商店/设施</div>
        <div><span class="tri"></span>药草/武器/道具</div>
      </div>
      <div class="actions">
        <button id="btnTalk" type="button">交谈/使用</button>
        <button id="btnAttack" type="button">攻击</button>
        <button id="btnDefend" type="button">防御</button>
        <button id="btnDodge" type="button">闪避</button>
        <button id="btnGift" type="button">赠礼</button>
        <button id="btnRest" type="button">休息</button>
        <button id="btnBackpack" type="button">背包</button>
        <button id="btnMagic" type="button">魔法</button>
      </div>
      <div class="gear-panel" id="gearPanel" aria-label="equipment panel"></div>
      <div class="log" id="log" aria-label="world log"></div>
    </aside>
  </main>
  <div id="backpackPanel" class="backpack-panel hidden" aria-label="backpack panel"></div>
  <div id="questPanel" class="quest-panel hidden" aria-label="quest panel"></div>
  <div id="shopPanel" class="shop-panel hidden" aria-label="shop panel"></div>
  <div id="forgePanel" class="forge-panel hidden" aria-label="forge panel"></div>
  <div id="magicPanel" class="magic-panel hidden" aria-label="magic panel"></div>
  <div id="mainMenu" class="menu-panel hidden" aria-label="main menu"></div>
  <div id="pauseMenu" class="pause-panel hidden" aria-label="pause menu"></div>
  <script src="./src/data.js"></script>
  <script src="./game.js"></script>
</body>
</html>
